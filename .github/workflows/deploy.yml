name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deploy-blue-star-vtt
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/BlueStarVTT
            ./deploy.sh